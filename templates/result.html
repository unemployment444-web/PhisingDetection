<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Result</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Apply threat-based class dynamically to change glow accents -->
<div class="container {% if prediction == 'Phishing Website' %}phishing-theme{% else %}safe-theme{% endif %}">
    
    <!-- Dynamic Icon -->
    <div class="status-icon">
        {% if prediction == 'Phishing Website' %}⚠️{% else %}✅{% endif %}
    </div>

    <h1>Analysis Result</h1>

    <h2 class="result-title {% if prediction == 'Phishing Website' %}phishing{% else %}safe{% endif %}">
        {{ prediction }}
    </h2>

    <p class="section-label">Analyzed URL</p>
    <div class="url">
        {{ url }}
    </div>

    <!-- Interactive Progress Bar (Confidence) -->
    <div class="confidence-container">
        <div class="confidence-label">
            <span>Scan Confidence</span>
            <span class="confidence-value">{{ confidence }}%</span>
        </div>
        <div class="progress">
            <div class="progress-fill" style="--width: {{ confidence }}%;"></div>
        </div>
    </div>

    <!-- Dynamic Reasons Box -->
    <div class="reasons {% if prediction == 'Phishing Website' %}threat-box{% else %}safe-box{% endif %}">
        <h3>Analysis Insights</h3>
        <ul>
            {% for reason in reasons %}
            <li>{{ reason }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="action-area">
        <a href="/" class="btn btn-secondary">Scan Another URL</a>
    </div>
</div>

</body>
</html>
