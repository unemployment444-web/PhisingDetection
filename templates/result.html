<!DOCTYPE html>

<html>

<head>
<title>Result</title>
<link rel="stylesheet" href="/static/style.css">
</head>


<body>

<div class="container">

<h1>Detection Result</h1>

<h2 class="
{% if prediction == 'Phishing Website' %}
phishing
{% else %}
safe
{% endif %}
">
{{ prediction }}
</h2>

<p>
<b>Website:</b>
</p>

<div class="url">
{{url}}
</div>


<h3>
Confidence:
{{confidence}}%
</h3>


<h3>
Detection Reasons
</h3>


<ul>

{% for reason in reasons %}

<li>
{{reason}}
</li>

{% endfor %}

</ul>


<a href="/">
<button>
Scan Another
</button>
</a>


</div>


</body>

</html>
